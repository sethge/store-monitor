<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小q聊天测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
.header { background: #07c160; color: #fff; padding: 12px 16px; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
.header select { padding: 4px 8px; border-radius: 4px; border: none; font-size: 13px; }
.messages { flex: 1; overflow-y: auto; padding: 12px 16px; }
.msg { max-width: 80%; margin-bottom: 12px; clear: both; }
.msg.user { float: right; }
.msg.assistant { float: left; }
.msg .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
.msg.user .bubble { background: #95ec69; border-top-right-radius: 4px; }
.msg.assistant .bubble { background: #fff; border-top-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.msg .meta { font-size: 11px; color: #999; margin-top: 2px; }
.msg.user .meta { text-align: right; }
.msg.assistant .tools { font-size: 11px; color: #07c160; margin-top: 4px; }
.thinking { float: left; margin-bottom: 12px; }
.thinking .bubble { background: #fff; padding: 10px 14px; border-radius: 12px; border-top-left-radius: 4px; color: #999; }
.thinking .dot { animation: blink 1.4s infinite; }
.thinking .dot:nth-child(2) { animation-delay: 0.2s; }
.thinking .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }
.input-area { background: #fff; padding: 10px 16px; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; }
.input-area textarea { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 14px; resize: none; height: 40px; font-family: inherit; }
.input-area textarea:focus { outline: none; border-color: #07c160; }
.input-area button { background: #07c160; color: #fff; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; cursor: pointer; }
.input-area button:disabled { background: #ccc; }
.clearfix::after { content: ''; display: table; clear: both; }
</style>
</head>
<body>
<div class="header">
  <span>小q聊天测试</span>
  <select id="operator">
    <option value="唐培华">唐培华</option>
    <option value="张议芳">张议芳</option>
    <option value="吴蔡倩" selected>吴蔡倩</option>
    <option value="石婷婷">石婷婷</option>
    <option value="王丽丽">王丽丽</option>
    <option value="王志华">王志华</option>
  </select>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
  <textarea id="input" placeholder="说点什么..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>
<script>
const API = 'http://localhost:5500/api/chat';
let history = [];

// 加载pending消息
async function loadPending() {
  const op = document.getElementById('operator').value;
  try {
    const resp = await fetch('http://localhost:5500/api/chat/pending?operator=' + encodeURIComponent(op));
    const data = await resp.json();
    if (data.messages && data.messages.length > 0) {
      for (const m of data.messages) {
        addMsg('assistant', m.content);
        history.push({role: 'assistant', content: m.content});
      }
    }
  } catch(e) {}
}

// 打开时自动拉
loadPending();

// 切换运营时重新拉
document.getElementById('operator').addEventListener('change', function() {
  history = [];
  document.getElementById('messages').innerHTML = '';
  loadPending();
});

function addMsg(role, text, tools) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role + ' clearfix';
  let html = '<div class="bubble">' + escapeHtml(text) + '</div>';
  if (role === 'assistant' && tools && tools.length) {
    html += '<div class="tools">🔧 ' + tools.join(', ') + '</div>';
  }
  div.innerHTML = html;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showThinking() {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'thinking clearfix';
  div.id = 'thinking';
  div.innerHTML = '<div class="bubble"><span class="dot">●</span> <span class="dot">●</span> <span class="dot">●</span></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  btn.disabled = true;
  addMsg('user', msg);
  history.push({role: 'user', content: msg});
  showThinking();

  try {
    const resp = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: msg,
        operator: document.getElementById('operator').value,
        history: history
      })
    });
    const data = await resp.json();
    hideThinking();
    addMsg('assistant', data.reply, data.tools_used);
    history.push({role: 'assistant', content: data.reply});
    // 自动保存这一轮对话
    fetch(API.replace('/chat', '/chat/save'), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        operator: document.getElementById('operator').value,
        messages: [
          {role: 'user', content: msg, ts: new Date().toISOString()},
          {role: 'assistant', content: data.reply, ts: new Date().toISOString()}
        ]
      })
    }).catch(()=>{});
  } catch(e) {
    hideThinking();
    addMsg('assistant', '连接失败: ' + e.message, []);
  }
  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
